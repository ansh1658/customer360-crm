{% extends "customer360/base.html" %}

{% block title %}Delete Communication{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card">

<div class="card-body text-center">

<i class="fa-solid fa-triangle-exclamation fa-4x text-danger mb-4"></i>

<h3>

Delete Communication

</h3>

<p class="mt-3">

Are you sure you want to delete the communication of

<strong>

{{ communication.customer_name }}

</strong>?

</p>

<form method="POST">

{% csrf_token %}

<div class="mt-4">

<a
href="{% url 'communication_list' %}"
class="btn btn-secondary">

Cancel

</a>

<button
type="submit"
class="btn btn-danger">

Delete

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
