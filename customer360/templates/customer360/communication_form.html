{% extends "customer360/base.html" %}

{% block title %}Communication Form{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card">

<div class="card-header bg-dark text-white">

<h4 class="mb-0">

Communication Form

</h4>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Customer Name

</label>

{{ form.customer_name }}

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label class="form-label">

Email

</label>

{{ form.email }}

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label class="form-label">

Phone

</label>

{{ form.phone }}

</div>

</div>

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label class="form-label">

Channel

</label>

{{ form.channel }}

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label class="form-label">

Direction

</label>

{{ form.direction }}

</div>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Summary

</label>

{{ form.summary }}

</div>

<div class="d-flex justify-content-end gap-2">

<a
href="{% url 'communication_list' %}"
class="btn btn-secondary">

Cancel

</a>

<button
type="submit"
class="btn btn-success">

<i class="fa-solid fa-floppy-disk"></i>

Save Communication

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
